<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventSphere - Resale Market</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-left">
            <img src="resources/logo.png" alt="EventSphere Logo" class="nav-logo">
            <span class="nav-brand">EventSphere</span>
        </div>
        
        <div class="nav-right">
            <nav class="nav-links">
                <a href="home.html">Browse Events</a>
                <a href="my-tickets.html">My Tickets</a>
                <a href="resale.html" class="active">Resale Market</a>
            </nav>
            <a href="profile.html" class="profile-link" title="My Profile">
                <img src="resources/user.png" alt="Profile" class="profile-pic">
            </a>
        </div>
    </header>

    <main class="container">
        <div class="page-header" style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 2.5rem; font-weight: 800; color: var(--primary-color);">Ticket Resale Hub</h1>
            <p class="subtitle" style="font-size: 1.1rem;">Buy from others securely, or sell tickets you can no longer use.</p>
        </div>

        <div class="resale-tabs">
            <button class="tab-btn active" onclick="switchResaleTab(event, 'tab-your-tickets')">Your Tickets</button>
            <button class="tab-btn" onclick="switchResaleTab(event, 'tab-purchase')">Purchase</button>
            <button class="tab-btn" onclick="switchResaleTab(event, 'tab-check-status')">Check Status</button>
        </div>
        
        <div id="tab-your-tickets" class="tab-content active">
            <div id="resale-your-tickets-container" class="event-grid"></div>
        </div>

        <div id="tab-purchase" class="tab-content">
            <div id="resale-purchase-container" class="event-grid"></div>
        </div>

        <div id="tab-check-status" class="tab-content">
            <div id="resale-check-status-container" class="event-grid"></div>
        </div>
    </main>

    <div id="resaleMyTicketModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; text-align: center; padding: 2rem;">
            <span class="close-modal" onclick="closeMyTicketResaleModal()">&times;</span>
            
            <div class="qr-container" style="margin-bottom: 1rem; width: 100%; padding: 0; border: none; background: transparent;">
                <img id="myTicketModalImg" src="resources/image1.jpg" alt="Event" style="width: 100%; border-radius: 14px; height: 160px; object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            </div>
            
            <h2 id="myTicketModalTitle" style="font-size: 1.6rem; font-weight: 800; color: var(--text-dark); margin-bottom: 5px;">Event Title</h2>
            <p id="myTicketModalLocDate" style="color: var(--text-light); font-size: 0.95rem; margin-bottom: 20px;">📍 Loc | 📅 Date</p>
            
            <div class="ticket-count-box">
                <h3 style="color: var(--primary-color); font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Tickets Available</h3>
                <p id="myTicketModalCount" style="font-size: 2.5rem; font-weight: 800; color: var(--text-dark); line-height: 1;">0</p>
            </div>
            
            <button id="myTicketModalResellBtn" class="btn-danger premium-btn">List 1 Ticket for Resale</button>
        </div>
    </div>

    <div id="resaleSellersModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 480px; padding: 2.5rem;">
            <span class="close-modal" onclick="closeResaleSellersModal()">&times;</span>
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <h2 id="resaleModalTitle" style="font-size: 1.5rem; font-weight: 800; color: var(--primary-color);">Available Tickets</h2>
                <p style="color: var(--text-light); font-size: 0.9rem;">Select a seller below to purchase your pass.</p>
            </div>
            <div id="resaleSellersList" class="seller-list">
                </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
