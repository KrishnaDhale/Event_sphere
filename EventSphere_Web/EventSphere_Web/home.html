<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventSphere - Browse Events</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-left">
            <img src="resources/logo.png" alt="EventSphere Logo" class="nav-logo">
            <span class="nav-brand">EventSphere</span>
        </div>
        
        <div class="nav-right">
            <nav class="nav-links">
                <a href="home.html" class="active">Browse Events</a>
                <a href="my-tickets.html">My Tickets</a>
                <a href="resale.html">Resale Market</a>
            </nav>
            
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Search events..." onkeyup="filterEvents()">
            </div>
            
            <a href="profile.html" class="profile-link" title="My Profile">
                <img src="resources/user.png" alt="Profile" class="profile-pic">
            </a>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content" id="hero-content">
            </div>
    </section>

    <main class="container" id="browse-events-section">
        <div class="page-header">
            <h1>Available Events</h1>
            <p class="subtitle">Discover, book, and enjoy the best events in town</p>
        </div>
        
        <div id="events-container" class="event-grid">
            </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
