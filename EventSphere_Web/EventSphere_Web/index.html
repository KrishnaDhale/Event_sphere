<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventSphere - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-overlay"></div> 
        
        <div class="auth-card">
            <div class="logo-container">
                <img src="resources\logo.png" alt="EventSphere Logo" class="app-logo">
            </div>
            
            <h2>Welcome to EventSphere</h2>
            <p class="subtitle">Log in to manage your events and tickets</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="e.g. user@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn-primary">Login to your account</button>
            </form>
            
            <p class="auth-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
