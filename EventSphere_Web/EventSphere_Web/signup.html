<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventSphere - Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-overlay"></div> 
        
        <div class="auth-card">
            <div class="logo-container">
                <img src="resources\logo.png" alt="EventSphere Logo" class="app-logo">
            </div>
            
            <h2>Create Account</h2>
            <p class="subtitle">Join EventSphere to discover and host events</p>
            
            <form id="signupForm">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="e.g. user@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a strong password" required>
                </div>
                
                <button type="submit" class="btn-primary">Sign Up</button>
            </form>
            
            <p class="auth-link">Already have an account? <a href="index.html">Login</a></p>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
</body>
</html>
